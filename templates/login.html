<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
<header>
    <div style="display: flex;">
        <img style="margin: 40px; width: 80px; height: 80px"
             src="{{ url_for('static', filename='images/Icon.png') }}">
        <h1 style="font-size: 72px">БашMAX</h1>
    </div>
</header>
<main style="display:flex; justify-content:center; ">
    <div style="
    background:#7FFF00;
    padding:40px;
    border-radius:15px;
    width:300px;
    text-align:center;
">

        <h2 style="font-size:28px;">Login</h2>
        <form method="post" style="text-align:center">
            <input name="username" placeholder="Username" style="width:100%; padding:10px; margin:10px 0;"><br>
            <input name="password" type="password" placeholder="Password"
                   style="width:100%; padding:10px; margin:10px 0;"><br>
            <button type="submit" style="padding:10px; width:150px; border-radius:20px; margin:20px">Login</button>
        </form>
        <a href="/guest">Continue as Guest</a>
    </div>
</main>


</body>
</html>
