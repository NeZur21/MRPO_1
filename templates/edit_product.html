<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    {% macro highlight(text, search) %}
    {% if search %}
    {{ text | replace(search, '<span style="background-color: yellow;">' ~ search ~ '</span>') | safe }}
    {% else %}
    {{ text }}
    {% endif %}
    {% endmacro %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<header>
    <div style="display: flex;">
        <img style="margin: 40px; width: 80px; height: 80px"
             src="{{ url_for('static', filename='images/Icon.png') }}">
        <h1 style="font-size: 72px">БашMAX</h1>
    </div>
</header>
<main>
    {% if message %}
    <p style="    font-weight: bold;
    text-align: center;
    font-size: 24px;
    padding: 15px;
    border-radius: 8px;
    margin: 20px auto;
    width: 50%;">{{ message }}</p>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        <div class="form-row">
            <label for="id">Артикул:</label>
            <input id="id" readonly name="id" value="{{p[0]}}">
        </div>
        <div class="form-row">
            <label for="artikul">Артикул (код):</label>
            <input id="artikul" name="artikul" value="{{p[1]}}">
        </div>
        <div class="form-row">
            <label for="name">Название:</label>
            <input id="name" name="name" value="{{p[2]}}">
        </div>
        <div class="form-row">
            <label for="unit">Ед. изм.:</label>
            <input id="unit" name="unit" value="{{p[3]}}">
        </div>
        <div class="form-row">
            <label for="category">Категория:</label>
            <input id="category" name="category" value="{{p[4]}}">
        </div>
        <div class="form-row">
            <label for="description">Описание:</label>
            <textarea id="description" name="description">{{p[5]}}</textarea>
        </div>
        <div class="form-row">
            <label for="manufacturer">Производитель:</label>
            <input id="manufacturer" name="manufacturer" value="{{p[6]}}">
        </div>
        <div class="form-row">
            <label for="supplier">Поставщик:</label>
            <input id="supplier" name="supplier" value="{{p[7]}}">
        </div>
        <div class="form-row">
            <label for="price">Цена:</label>
            <input id="price" name="price" min="0" step="0.01" value="{{p[8]}}">
        </div>
        <div class="form-row">
            <label for="discount">Скидка:</label>
            <input id="discount" name="discount" value="{{p[9]}}">
        </div>
        <div class="form-row">
            <label for="quantity">Количество:</label>
            <input id="quantity" name="quantity" step="1" min="0" value="{{p[10]}}">
        </div>
        <div class="form-row">
            <label>Изображение:</label>
            <input type="file" name="image">
        </div>
        <button type="submit">Сохранить</button>
    </form>
</main>


</body>
</html>
